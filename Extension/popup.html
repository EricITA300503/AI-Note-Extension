<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; width: 300px; padding: 20px; text-align: center; }
    h3 { margin-top: 0; margin-bottom: 5px; }
    p.desc { font-size: 13px; color: #555; margin-bottom: 15px; }
    select, button { width: 100%; margin-top: 10px; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
    button { background-color: #007bff; color: white; transition: 0.2s; }
    button:hover { background-color: #0056b3; }
    #status { margin-top: 15px; font-size: 13px; font-weight: bold; color: #333; }
  </style>
</head>
<body>

  <h3>AI Chat Recorder</h3>
  <p class="desc">Select a prompt. The AI will watch this chat and build your note automatically.</p>
  
  <select id="promptSelect">
    <option value="prompt1">Prompt 1 (Default)</option>
    <option value="prompt2">Prompt 2</option>
    <option value="prompt3">Prompt 3</option>
  </select>
  
  <button id="sendBtn">Start Recording Chat</button>
  
  <p id="status">System Idle.</p>

  <script src="popup.js"></script>
</body>
</html>
