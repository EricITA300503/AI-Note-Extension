<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; width: 400px; padding: 20px; }
    textarea { width: 100%; height: 60px; margin-bottom: 10px; }
    button { padding: 8px 16px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Manage Prompts</h2>
  
  <label>Prompt 1 (Default):</label>
  <textarea id="p1"></textarea>
  
  <label>Prompt 2:</label>
  <textarea id="p2"></textarea>
  
  <label>Prompt 3:</label>
  <textarea id="p3"></textarea>

  <div style="margin: 15px 0; text-align: left;">
    <input type="checkbox" id="deepSynthesis">
    <label for="deepSynthesis" style="font-weight: bold; font-size: 14px;">
      Enable AI Deep Synthesis Pass<br>
      <span style="font-size: 11px; color: #666; font-weight: normal;">Uses a heavier model to rewrite the final note. Slower, requires High-End GPU.</span>
    </label>
  </div>

  <button id="saveBtn">Save Options</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
