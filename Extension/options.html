<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui; width: 400px; padding: 20px; }
    textarea { width: 100%; margin-bottom: 15px; font-family: monospace; font-size: 12px; }
    button { padding: 8px 16px; cursor: pointer; font-weight: bold; }
    .label-title { font-weight: bold; margin-bottom: 5px; display: block; }
    .desc { font-size: 11px; color: #666; margin-bottom: 5px; display: block; }
  </style>
</head>
<body>
  <h2>Manage AI Prompts</h2>

  <label class="label-title">Global AI Persona (Master Rules):</label>
  <span class="desc">Defines Llama 3's overarching role and formatting rules for every note.</span>
  <textarea id="masterPrompt" style="height: 100px;"></textarea>
  
  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">

  <label class="label-title">Prompt 1 (Task Default):</label>
  <textarea id="p1" style="height: 50px;"></textarea>
  
  <label class="label-title">Prompt 2 (Task Option):</label>
  <textarea id="p2" style="height: 50px;"></textarea>
  
  <label class="label-title">Prompt 3 (Task Option):</label>
  <textarea id="p3" style="height: 50px;"></textarea>

  <button id="saveBtn" style="margin-top: 10px;">Save Configuration</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
